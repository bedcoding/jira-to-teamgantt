<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <clipPath id="bgK"><rect x="6" y="6" width="116" height="116" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#bgK)">
    <rect x="0" y="0" width="64" height="128" fill="#0052cc"/>
    <rect x="64" y="0" width="64" height="128" fill="#48be88"/>
  </g>

  <!-- 좌측 카드 - 라운드 모서리로 실효 좌영역이 좁아진 것을 보정 (중심 x=39). -->
  <g>
    <rect x="23" y="46" width="32" height="36" rx="5" fill="#fff"/>
    <rect x="29" y="56" width="20" height="4" rx="2" fill="#0052cc" opacity="0.55"/>
    <rect x="29" y="64" width="14" height="4" rx="2" fill="#0052cc" opacity="0.35"/>
    <rect x="29" y="72" width="18" height="4" rx="2" fill="#0052cc" opacity="0.35"/>
  </g>

  <!-- 우측 간트 바 - 좌측 끝 정렬 + 우측이 점점 짧아지는 역피라미드 -->
  <g fill="#fff">
    <rect x="73" y="46" width="32" height="8" rx="2"/>
    <rect x="73" y="60" width="28" height="8" rx="2"/>
    <rect x="73" y="74" width="22" height="8" rx="2"/>
  </g>
</svg>
